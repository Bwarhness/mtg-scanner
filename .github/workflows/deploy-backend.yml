name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t mtg-scanner-backend:latest \
            --load \
            ./backend

      - name: Save Docker image
        run: |
          docker save mtg-scanner-backend:latest | gzip > mtg-scanner-backend.tar.gz

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Transfer image to server
        run: |
          scp mtg-scanner-backend.tar.gz ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/

      - name: Deploy on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            docker load < /tmp/mtg-scanner-backend.tar.gz

            docker stop mtg-scanner-backend 2>/dev/null || true
            docker rm mtg-scanner-backend 2>/dev/null || true

            docker run -d --name mtg-scanner-backend \
              --restart unless-stopped \
              -p 8000:8000 \
              -e OPENROUTER_API_KEY=$OPENROUTER_API_KEY \
              mtg-scanner-backend:latest

            sleep 5

            if docker ps | grep -q mtg-scanner-backend; then
              echo "Container started successfully"
            else
              echo "Container failed to start"
              docker logs mtg-scanner-backend
              exit 1
            fi

            rm /tmp/mtg-scanner-backend.tar.gz
          EOF

      - name: Verify deployment
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            sleep 3
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
              echo "Health check passed"
              echo "Deployment successful!"
            else
              echo "Health check failed"
              exit 1
            fi
          EOF

      - name: Cleanup local artifacts
        if: always()
        run: |
          rm -f mtg-scanner-backend.tar.gz
          rm -f ~/.ssh/id_rsa
